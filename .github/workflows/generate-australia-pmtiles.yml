name: Generate Australian PMTiles

on:
  schedule:
    - cron: '0 3 1 * *'  # 1st of every month at 3am UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "DATE=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Get yesterday's date (Protomaps build may lag by a day)
        id: yesterday
        run: echo "DATE=$(date -d yesterday +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Install pmtiles CLI
        run: |
          wget -q https://github.com/protomaps/go-pmtiles/releases/latest/download/go-pmtiles_Linux_x86_64.tar.gz
          tar -xzf go-pmtiles_Linux_x86_64.tar.gz
          chmod +x pmtiles
          ./pmtiles --version

      - name: Check available disk space
        run: df -h

      - name: Extract Australia from Protomaps daily build
        run: |
          # Try today's build first, fall back to yesterday's
          TODAY_URL="https://build.protomaps.com/${{ steps.date.outputs.DATE }}.pmtiles"
          YESTERDAY_URL="https://build.protomaps.com/${{ steps.yesterday.outputs.DATE }}.pmtiles"

          echo "Trying today's build: $TODAY_URL"
          if curl --head --silent --fail "$TODAY_URL" > /dev/null; then
            SOURCE_URL="$TODAY_URL"
            echo "Using today's build"
          else
            echo "Today's build not available, falling back to yesterday's"
            SOURCE_URL="$YESTERDAY_URL"
          fi

          echo "Extracting Australia bbox from: $SOURCE_URL"
          # Bounding box covers mainland Australia + Tasmania
          # West: 113.0, South: -43.7, East: 154.0, North: -10.7
          ./pmtiles extract "$SOURCE_URL" australia.pmtiles \
            --bbox=113.0,-43.7,154.0,-10.7 \
            --maxzoom=14

          echo "Extraction complete. File size:"
          ls -lh australia.pmtiles

      - name: Generate metadata file
        run: |
          cat > metadata.json << EOF
          {
            "generated": "${{ steps.date.outputs.DATE }}",
            "source": "Protomaps / OpenStreetMap",
            "license": "ODbL",
            "region": "Australia",
            "bbox": [113.0, -43.7, 154.0, -10.7],
            "maxzoom": 14,
            "file": "australia.pmtiles",
            "size_bytes": $(stat -c%s australia.pmtiles)
          }
          EOF
          cat metadata.json

      - name: Install rclone for R2 upload
        run: |
          curl https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Configure rclone for Cloudflare R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          acl = public-read
          EOF

      - name: Upload to Cloudflare R2
        run: |
          BUCKET="${{ secrets.R2_BUCKET_NAME }}"

          # Upload the pmtiles file with cache headers
          rclone copyto australia.pmtiles "r2:${BUCKET}/australia/australia.pmtiles" \
            --s3-no-check-bucket \
            --header-upload "Cache-Control: public, max-age=2592000" \
            --progress

          # Upload metadata
          rclone copyto metadata.json "r2:${BUCKET}/australia/metadata.json" \
            --s3-no-check-bucket \
            --header-upload "Cache-Control: public, max-age=3600" \
            --header-upload "Content-Type: application/json"

          # Upload a "latest" pointer (always points to most recent)
          cp metadata.json latest.json
          rclone copyto latest.json "r2:${BUCKET}/australia/latest.json" \
            --s3-no-check-bucket \
            --header-upload "Cache-Control: public, max-age=3600" \
            --header-upload "Content-Type: application/json"

          echo "Upload complete!"
          echo "File available at: https://${{ secrets.R2_PUBLIC_URL }}/australia/australia.pmtiles"

      - name: Create GitHub Release entry (for changelog tracking)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: maps-${{ steps.date.outputs.DATE }}
          name: Australia Maps - ${{ steps.date.outputs.DATE }}
          body: |
            ## Australian PMTiles - ${{ steps.date.outputs.DATE }}

            Generated from Protomaps / OpenStreetMap data.

            **Download URL:**
            `https://${{ secrets.R2_PUBLIC_URL }}/australia/australia.pmtiles`

            **Metadata:**
            `https://${{ secrets.R2_PUBLIC_URL }}/australia/metadata.json`

            **Coverage:** Mainland Australia + Tasmania
            **Bounding box:** 113.0, -43.7, 154.0, -10.7
            **Max zoom:** 14
            **License:** ODbL (OpenStreetMap)
          make_latest: true
