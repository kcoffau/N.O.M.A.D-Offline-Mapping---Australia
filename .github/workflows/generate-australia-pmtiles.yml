name: Generate Australian PMTiles

on:
  schedule:
    - cron: '0 3 1 * *'  # 1st of every month at 3am UTC
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get dates
        id: dates
        run: |
          echo "TODAY=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          echo "YESTERDAY=$(date -d yesterday +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Check available disk space
        run: df -h

      - name: Pull pmtiles Docker image
        run: docker pull ghcr.io/protomaps/go-pmtiles:main

      - name: Resolve Protomaps build URL
        id: source
        run: |
          TODAY_URL="https://build.protomaps.com/${{ steps.dates.outputs.TODAY }}.pmtiles"
          YESTERDAY_URL="https://build.protomaps.com/${{ steps.dates.outputs.YESTERDAY }}.pmtiles"

          if curl --head --silent --fail "$TODAY_URL" > /dev/null; then
            echo "URL=$TODAY_URL" >> $GITHUB_OUTPUT
            echo "Using today's build: $TODAY_URL"
          else
            echo "URL=$YESTERDAY_URL" >> $GITHUB_OUTPUT
            echo "Falling back to yesterday's build: $YESTERDAY_URL"
          fi

      - name: Extract Australia bbox
        run: |
          docker run --rm -v "$PWD":/data ghcr.io/protomaps/go-pmtiles:main \
            extract "${{ steps.source.outputs.URL }}" /data/australia.pmtiles \
            --bbox=113.0,-43.7,154.0,-10.7 \
            --maxzoom=14

          echo "Extraction complete. File size:"
          ls -lh australia.pmtiles

      - name: Generate metadata file
        run: |
          cat > metadata.json << EOF
          {
            "generated": "${{ steps.dates.outputs.TODAY }}",
            "source": "Protomaps / OpenStreetMap",
            "license": "ODbL",
            "region": "Australia",
            "bbox": [113.0, -43.7, 154.0, -10.7],
            "maxzoom": 14,
            "file": "australia.pmtiles",
            "size_bytes": $(stat -c%s australia.pmtiles)
          }
          EOF
          cat metadata.json

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for Cloudflare R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          acl = public-read
          EOF

      - name: Upload to Cloudflare R2
        run: |
          BUCKET="${{ secrets.R2_BUCKET_NAME }}"

          rclone copyto australia.pmtiles "r2:${BUCKET}/australia/australia.pmtiles" \
            --s3-no-check-bucket \
            --header-upload "Cache-Control: public, max-age=2592000" \
            --progress

          rclone copyto metadata.json "r2:${BUCKET}/australia/metadata.json" \
            --s3-no-check-bucket \
            --header-upload "Cache-Control: public, max-age=3600" \
            --header-upload "Content-Type: application/json"

          rclone copyto metadata.json "r2:${BUCKET}/australia/latest.json" \
            --s3-no-check-bucket \
            --header-upload "Cache-Control: public, max-age=3600" \
            --header-upload "Content-Type: application/json"

          echo "Upload complete!"
          echo "File available at: https://${{ secrets.R2_PUBLIC_URL }}/australia/australia.pmtiles"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: maps-${{ steps.dates.outputs.TODAY }}
          name: Australia Maps - ${{ steps.dates.outputs.TODAY }}
          body: |
            ## Australian PMTiles - ${{ steps.dates.outputs.TODAY }}

            Generated from Protomaps / OpenStreetMap data.

            **Download:**
            `https://${{ secrets.R2_PUBLIC_URL }}/australia/australia.pmtiles`

            **Metadata:**
            `https://${{ secrets.R2_PUBLIC_URL }}/australia/latest.json`

            **Coverage:** Mainland Australia + Tasmania
            **Bbox:** 113.0, -43.7, 154.0, -10.7
            **Max zoom:** 14
            **License:** ODbL
          make_latest: true
